<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@keyframes altms-drive { from { offset-distance: 0%; } to { offset-distance: 100%; } }
@keyframes altms-pulse { 0% { r: 11; opacity: 0.45; } 70% { r: 30; opacity: 0; } 100% { r: 30; opacity: 0; } }
@keyframes altms-scan { 0% { r: 8; opacity: 0.5; } 80% { r: 70; opacity: 0; } 100% { r: 70; opacity: 0; } }
@keyframes altms-dash { to { stroke-dashoffset: -24; } }
</style>
</helmet>
<div style="position:absolute; inset:0; width:100%; height:100%; background:#E8ECF1; overflow:hidden;">
  <svg viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet" style="width:100%; height:100%; display:block; font-family:Inter, system-ui, sans-serif;">
    <!-- land -->
    <rect x="0" y="0" width="1000" height="700" fill="#E8ECF1"></rect>
    <!-- green areas -->
    <path d="M -40 60 Q 160 -20 300 70 Q 360 160 240 220 Q 80 250 -20 180 Z" fill="#D7E7D2"></path>
    <path d="M 760 540 Q 900 480 1040 560 L 1040 760 L 720 760 Q 700 620 760 540 Z" fill="#D7E7D2"></path>
    <path d="M 540 30 Q 660 0 780 50 Q 820 110 740 140 Q 600 150 540 100 Z" fill="#DCEAD7"></path>
    <!-- water (Awba Dam) -->
    <path d="M -40 470 Q 120 430 230 500 Q 300 560 220 630 Q 80 700 -40 640 Z" fill="#C7DCEA"></path>
    <!-- buildings -->
    <g fill="#DBE1E9">
      <rect x="350" y="250" width="60" height="42" rx="4"></rect>
      <rect x="420" y="262" width="46" height="34" rx="4"></rect>
      <rect x="260" y="160" width="52" height="40" rx="4"></rect>
      <rect x="320" y="150" width="40" height="30" rx="4"></rect>
      <rect x="600" y="150" width="70" height="46" rx="4"></rect>
      <rect x="676" y="166" width="44" height="34" rx="4"></rect>
      <rect x="810" y="270" width="64" height="46" rx="4"></rect>
      <rect x="876" y="286" width="40" height="32" rx="4"></rect>
      <rect x="520" y="392" width="64" height="44" rx="4"></rect>
      <rect x="680" y="492" width="70" height="48" rx="4"></rect>
      <rect x="396" y="500" width="64" height="44" rx="4"></rect>
      <rect x="140" y="540" width="70" height="46" rx="4"></rect>
      <rect x="212" y="556" width="40" height="30" rx="4"></rect>
    </g>
    <!-- roads casing -->
    <g fill="none" stroke="#D0D7E1" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
      <path d="M180 560 C 250 470 300 420 430 300"></path>
      <path d="M300 200 L 430 300"></path>
      <path d="M430 300 C 520 250 580 200 640 180"></path>
      <path d="M430 300 L 560 420"></path>
      <path d="M560 420 L 720 520"></path>
      <path d="M560 420 C 700 400 800 360 850 300"></path>
      <path d="M430 520 L 560 420"></path>
      <path d="M180 560 C 280 560 360 540 430 520"></path>
      <path d="M640 180 C 760 200 840 240 850 300"></path>
    </g>
    <!-- roads surface -->
    <g fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M180 560 C 250 470 300 420 430 300"></path>
      <path d="M300 200 L 430 300"></path>
      <path d="M430 300 C 520 250 580 200 640 180"></path>
      <path d="M430 300 L 560 420"></path>
      <path d="M560 420 L 720 520"></path>
      <path d="M560 420 C 700 400 800 360 850 300"></path>
      <path d="M430 520 L 560 420"></path>
      <path d="M180 560 C 280 560 360 540 430 520"></path>
      <path d="M640 180 C 760 200 840 240 850 300"></path>
    </g>

    <!-- minor location pins -->
    <sc-for list="{{ minor }}" as="p" hint-placeholder-count="6">
      <g transform="{{ p.transform }}">
        <circle r="6" fill="#94A3B8" stroke="#FFFFFF" stroke-width="2.5"></circle>
        <foreignObject x="{{ p.fx }}" y="-12" width="{{ p.fw }}" height="24">
          <div style="font-family:Inter,system-ui,sans-serif; font-size:13px; font-weight:600; line-height:24px; color:#516079; text-align:{{ p.align }}; text-shadow:0 0 4px #E8ECF1,0 0 4px #E8ECF1,0 0 4px #E8ECF1; white-space:nowrap;">{{ p.label }}</div>
        </foreignObject>
      </g>
    </sc-for>

    <!-- route -->
    <sc-if value="{{ showRoute }}" hint-placeholder-val="{{ false }}">
      <path d="{{ routePath }}" fill="none" stroke="#1F4E79" stroke-width="5.5" stroke-linecap="round" opacity="0.9"></path>
      <path d="{{ routePath }}" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 10" style="animation: altms-dash 1s linear infinite;"></path>
    </sc-if>

    <!-- endpoints -->
    <sc-for list="{{ endpoints }}" as="e" hint-placeholder-count="2">
      <g transform="{{ e.transform }}">
        <foreignObject x="-100" y="-70" width="200" height="46">
          <div style="font-family:Inter,system-ui,sans-serif; text-align:center; white-space:nowrap;">
            <div style="font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:{{ e.fill }}; text-shadow:0 0 5px #fff,0 0 5px #fff,0 0 5px #fff;">{{ e.role }}</div>
            <div style="font-size:14px; font-weight:600; color:#16263B; text-shadow:0 0 5px #fff,0 0 5px #fff,0 0 5px #fff,0 0 5px #fff;">{{ e.label }}</div>
          </div>
        </foreignObject>
        <path d="M0 4 C -13 4 -19 -8 -19 -16 C -19 -28 -10 -36 0 -36 C 10 -36 19 -28 19 -16 C 19 -8 13 4 0 4 Z" fill="{{ e.fill }}" stroke="#FFFFFF" stroke-width="2.5"></path>
        <circle cx="0" cy="-17" r="6.5" fill="#FFFFFF"></circle>
      </g>
    </sc-for>

    <!-- searching pulse at pickup -->
    <sc-if value="{{ scanning }}" hint-placeholder-val="{{ false }}">
      <g transform="{{ scanTransform }}">
        <circle r="8" fill="none" stroke="#00A896" stroke-width="3" style="animation: altms-scan 2s ease-out infinite;"></circle>
        <circle r="8" fill="none" stroke="#00A896" stroke-width="3" style="animation: altms-scan 2s ease-out infinite; animation-delay:1s;"></circle>
      </g>
    </sc-if>

    <!-- driver marker -->
    <sc-if value="{{ tracking }}" hint-placeholder-val="{{ false }}">
      <g style="{{ driverStyle }}">
        <circle cx="0" cy="0" r="11" fill="#00A896" opacity="0.4" style="animation: altms-pulse 2s ease-out infinite;"></circle>
        <circle cx="0" cy="0" r="13" fill="#00A896" stroke="#FFFFFF" stroke-width="3"></circle>
        <path d="M0 -6 L5 6 L0 2.5 L-5 6 Z" fill="#FFFFFF"></path>
      </g>
    </sc-if>
  </svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:420},&quot;pickup&quot;:{&quot;editor&quot;:null,&quot;default&quot;:1},&quot;destination&quot;:{&quot;editor&quot;:null,&quot;default&quot;:2},&quot;tracking&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;scanning&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;phase&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;route&quot;}}">
class Component extends DCLogic {
  get LOCS() {
    return [
      { id: 1, x: 180, y: 560, label: 'Main Gate' },
      { id: 2, x: 430, y: 300, label: 'Faculty of Science' },
      { id: 3, x: 300, y: 200, label: 'Faculty of Arts' },
      { id: 4, x: 640, y: 180, label: 'Education & Agric' },
      { id: 5, x: 850, y: 300, label: 'College of Medicine' },
      { id: 6, x: 560, y: 420, label: 'Postgraduate School' },
      { id: 7, x: 430, y: 520, label: 'Student Union' },
      { id: 8, x: 720, y: 520, label: 'Residential Halls' },
    ];
  }
  renderVals() {
    const locs = this.LOCS;
    const pid = this.props.pickup != null ? Number(this.props.pickup) : null;
    const did = this.props.destination != null ? Number(this.props.destination) : null;
    const tracking = !!this.props.tracking;
    const scanning = !!this.props.scanning;
    const find = (id) => locs.find((l) => l.id === id);
    const p = pid ? find(pid) : null;
    const d = did ? find(did) : null;

    const minor = locs
      .filter((l) => !(p && l.id === p.id) && !(d && l.id === d.id))
      .map((l) => {
        const left = l.x > 760;
        return {
          transform: `translate(${l.x},${l.y})`,
          label: l.label,
          fx: left ? -162 : 12,
          fw: 150,
          align: left ? 'right' : 'left',
        };
      });

    let routePath = null;
    if (p && d) {
      const mx = (p.x + d.x) / 2 + (p.y - d.y) * 0.18;
      const my = (p.y + d.y) / 2 - Math.abs(p.x - d.x) * 0.18 - 30;
      routePath = `M ${p.x} ${p.y} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${d.x} ${d.y}`;
    }

    const endpoints = [];
    if (p) endpoints.push({ transform: `translate(${p.x},${p.y})`, fill: '#1F4E79', role: 'Pickup', label: p.label });
    if (d) endpoints.push({ transform: `translate(${d.x},${d.y})`, fill: '#00A896', role: 'Drop-off', label: d.label });

    // Driver travels toward pickup, then along route to destination depending on phase.
    let driveTarget = routePath;
    if (this.props.phase === 'topickup' && p) {
      // come from main gate-ish corner toward pickup
      const sx = 120, sy = 360;
      driveTarget = `M ${sx} ${sy} Q ${(sx + p.x) / 2} ${(sy + p.y) / 2 - 40} ${p.x} ${p.y}`;
    }
    const driverStyle = driveTarget
      ? `offset-path: path('${driveTarget}'); offset-rotate: 0deg; animation: altms-drive 7s linear infinite;`
      : '';

    return {
      minor,
      endpoints,
      showRoute: !!routePath && this.props.phase !== 'topickup',
      routePath: routePath || '',
      tracking,
      scanning,
      scanTransform: p ? `translate(${p.x},${p.y})` : 'translate(-100,-100)',
      driverStyle,
    };
  }
}
</script>
</body>
</html>
